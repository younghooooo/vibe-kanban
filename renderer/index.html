<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com https://esm.sh; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://esm.sh; connect-src 'self' https://esm.sh https://api.github.com;">
<title>Kanban</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fraunces:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.min.css" />
<link rel="stylesheet" id="hljs-theme-light" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css" />
<link rel="stylesheet" id="hljs-theme-dark"  href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css" media="(prefers-color-scheme: dark)" />
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          sans: ['Pretendard Variable', 'Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'ui-sans-serif', 'sans-serif'],
          serif: ['Fraunces', 'ui-serif', 'Georgia'],
          mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
        },
      }
    }
  };
</script>
<link rel="stylesheet" href="styles.css">
<script>
  (function () {
    try {
      var theme = localStorage.getItem('vk:theme');
      if (!theme) {
        theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      if (theme === 'dark') document.documentElement.classList.add('dark');
      else document.documentElement.classList.remove('dark');

      var sidebar = localStorage.getItem('vk:sidebar') || 'open';
      document.documentElement.setAttribute('data-sidebar', sidebar);
    } catch (e) {
      document.documentElement.setAttribute('data-sidebar', 'open');
    }
  })();
</script>
</head>
<body class="font-sans antialiased" data-sidebar="open">

<div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>

<script type="importmap">
{
  "imports": {
    "@tiptap/core":                    "https://esm.sh/@tiptap/core@2",
    "@tiptap/starter-kit":             "https://esm.sh/@tiptap/starter-kit@2",
    "@tiptap/extension-task-list":     "https://esm.sh/@tiptap/extension-task-list@2",
    "@tiptap/extension-task-item":     "https://esm.sh/@tiptap/extension-task-item@2",
    "@tiptap/extension-placeholder":   "https://esm.sh/@tiptap/extension-placeholder@2",
    "@tiptap/extension-code-block-lowlight": "https://esm.sh/@tiptap/extension-code-block-lowlight@2",
    "lowlight":                        "https://esm.sh/lowlight@3",
    "tiptap-markdown":                 "https://esm.sh/tiptap-markdown@0"
  }
}
</script>
<script type="module" src="app.js"></script>
</body>
</html>
